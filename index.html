<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1 Notification</title>
<style>
  /* ── Global Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Notification Window ── */
  #notification-window {
    width: min(280px, 90vw);
    background: #1e3a2f;
    border: 1px solid #3a5a47;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  .win-titlebar {
    background: #2a4a38;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #3a5a47;
  }

  .win-titlebar-title {
    font-size: 11px;
    color: #a8c8b8;
    letter-spacing: 0.3px;
  }

  .win-controls {
    display: flex;
    gap: 6px;
  }

  .win-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent;
    background: #4a7a5a;
  }

  .win-btn:hover { color: #1e3a2f; }
  .win-btn.close { background: #6a4a4a; }
  .win-btn.minimize { background: #6a6a3a; }
  .win-btn.maximize { background: #3a6a4a; }

  .notif-body {
    padding: 30px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
  }

  .notif-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .notif-bell {
    font-size: 28px;
    filter: grayscale(0.3);
  }

  .notif-title {
    font-size: 22px;
    font-weight: 700;
    color: #c8e8d0;
    letter-spacing: 0.5px;
  }

  .btn-open {
    background: #4a9a5a;
    color: #d0f0d8;
    border: none;
    border-radius: 3px;
    padding: 10px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s;
  }

  .btn-open:hover { background: #5ab56a; }

  /* ── Question Dialog ── */
  #question-dialog {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(0,0,0,0.4);
  }

  #question-dialog.visible { display: flex; }

  .dialog-window {
    width: min(320px, 92vw);
    background: #1e3a2f;
    border: 1px solid #3a5a47;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    overflow: hidden;
  }

  .dialog-titlebar {
    background: #2a4a38;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #3a5a47;
  }

  .dialog-titlebar-title {
    font-size: 11px;
    color: #a8c8b8;
    letter-spacing: 0.3px;
  }

  .dialog-body {
    padding: 36px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .dialog-question {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 26px;
    font-style: italic;
    font-weight: 700;
    color: #c8e8d0;
    text-align: center;
    line-height: 1.2;
  }

  .dialog-buttons {
    display: flex;
    gap: 16px;
  }

  .btn-no, .btn-ok {
    background: #4a9a5a;
    color: #d0f0d8;
    border: none;
    border-radius: 3px;
    padding: 10px 36px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s;
  }

  .btn-no:hover, .btn-ok:hover { background: #5ab56a; }

  /* ── Lyrics Screen ── */
  #lyrics-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 60% 40%, #1a4a38 0%, #0d2a20 50%, #071a14 100%);
    overflow: hidden;
    z-index: 200;
  }

  #lyrics-screen.visible { display: block; }

  #lyrics-screen {
    opacity: 1;
    transition: opacity 2s ease;
  }

  #lyrics-screen.fade-out {
    opacity: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Star particles */
  .star {
    position: absolute;
    border-radius: 50%;
    background: #80d4c0;
    opacity: 0;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--max-op); transform: scale(1); }
  }

  /* Lyric lines */
  .lyric-line {
    position: absolute;
    left: 0;
    right: 0;
    text-align: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(18px, 2.8vw, 30px);
    font-style: italic;
    font-weight: 700;
    color: #7de8c8;
    text-shadow:
      0 0 8px rgba(125, 232, 200, 0.7),
      0 0 20px rgba(125, 232, 200, 0.3);
    padding: 0 40px;
    white-space: normal;
    max-width: 90vw;
    margin: 0 auto;
    pointer-events: none;
    transition: opacity 2s ease;
    opacity: 1;
  }

  .lyric-line.fading { opacity: 0; }
</style>
</head>
<body>

<div id="notification-window">
  <div class="win-titlebar">
    <span class="win-titlebar-title">1 Notification</span>
    <div class="win-controls">
      <button class="win-btn minimize">─</button>
      <button class="win-btn maximize">□</button>
      <button class="win-btn close">✕</button>
    </div>
  </div>
  <div class="notif-body">
    <div class="notif-header">
      <span class="notif-bell">🔔</span>
      <span class="notif-title">1 Notification</span>
    </div>
    <button class="btn-open" onclick="openDialog()">Open</button>
  </div>
</div>

<div id="question-dialog">
  <div class="dialog-window">
    <div class="dialog-titlebar">
      <span class="dialog-titlebar-title">Question</span>
      <div class="win-controls">
        <button class="win-btn minimize">─</button>
        <button class="win-btn maximize">□</button>
        <button class="win-btn close">✕</button>
      </div>
    </div>
    <div class="dialog-body">
      <div class="dialog-question">Ruin the Friendship?</div>
      <div class="dialog-buttons">
        <button class="btn-no" onclick="closeDialog()">NO</button>
        <button class="btn-ok" onclick="startLyrics()">OK</button>
      </div>
    </div>
  </div>
</div>

<div id="lyrics-screen"></div>

<audio id="song" src="ruinthefriendshiplyrics.mp3" preload="auto"></audio>

<script>
  /* ─────────────────────────────────────────────────────
     LYRICS — Corrected Time-aligned database
  ───────────────────────────────────────────────────── */
  const LYRICS = [
    ["Should've kissed you anyway",                    0.0,   6.0],
    ["Should've kissed you anyway",                    3.25,   6.0],
    ["anyway",                                         5.5,   6.0],
    ["And it was not",                                 6.5,   6.0],
    ["My advice is always ruin the friendship",        8.0,   6.0],
    ["Better that than regret it for all time",       12.0,   6.0],
    ["Should've kissed you anyway",                    16.5,   6.0],
    ["And my advice is always answer the question",   20.5,   6.0],
    ["Better that than to ask it all your life",      24.5,   6.0],
    ["should've kissed you anyway...",                28.5,   5.5]
  ];

  /* ── Scroll speed & Particle config ── */
  const SCROLL_SPEED = 80;   
  const STAR_COUNT   = 80;

  /* ── State ── */
  let animFrameId   = null;
  let startTime     = null;
  let activeLines   = [];
  let songEnded     = false;   

  const audio = document.getElementById('song');

  audio.addEventListener('ended', () => {
    songEnded = true;

    activeLines.forEach(line => {
      line.el.classList.add('fading');
    });

    setTimeout(() => {
      document.getElementById('lyrics-screen').classList.add('fade-out');
    }, 1000);

    setTimeout(() => {
      const restart = confirm('It is just so sad to think that our chapter ends.');
      if (restart) {
        location.reload();
      }
    }, 2500);
  });

  /* ─── Dialog helpers ─── */
  function openDialog() {
    document.getElementById('question-dialog').classList.add('visible');
  }

  function closeDialog() {
    document.getElementById('question-dialog').classList.remove('visible');
  }

  /* ─── OK Clicked: Trigger Instant Show ─── */
  function startLyrics() {
    closeDialog();
    document.getElementById('notification-window').style.display = 'none';

    const screen = document.getElementById('lyrics-screen');
    screen.classList.add('visible');
    screen.classList.remove('fade-out');
    screen.innerHTML = '';
    activeLines = [];
    songEnded = false;

    spawnStars(screen);

    // Audio plays instantly due to direct user tap target sequence
    audio.currentTime = 0;
    audio.play().catch((err) => {
      console.log("Autoplay context note:", err);
      showTapOverlay(screen);
    });

    startTime = null;
    animFrameId = requestAnimationFrame(tick);
  }

  /* ─── Tap-to-start overlay (Safety mechanism if context fails) ─── */
  function showTapOverlay(screen) {
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:absolute; inset:0; display:flex; align-items:center;
      justify-content:center; z-index:999; cursor:pointer;
    `;
    overlay.innerHTML = `<div style="
      font-family:Georgia,serif; font-style:italic; font-size:22px;
      color:#7de8c8; text-shadow:0 0 12px rgba(125,232,200,0.7);
      animation: pulse 1.4s ease-in-out infinite;
    ">Tap anywhere to start ♪</div>`;
    screen.appendChild(overlay);
    overlay.addEventListener('click', () => {
      audio.play();
      overlay.remove();
    }, { once: true });
  }

  /* ─── Particle stars ─── */
  function spawnStars(container) {
    for (let i = 0; i < STAR_COUNT; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        --dur:${(Math.random()*3+1.5).toFixed(2)}s;
        --delay:-${(Math.random()*4).toFixed(2)}s;
        --max-op:${(Math.random()*0.6+0.2).toFixed(2)};
      `;
      container.appendChild(s);
    }
  }

  /* ─── Animation loop ─── */
  function tick(ts) {
    // FIX 1: Instantly cancel the animation framework when the file reports it has fully completed
    if (songEnded && activeLines.length === 0) {
      cancelAnimationFrame(animFrameId);
      return;
    }

    if (!startTime) startTime = ts;
    const elapsed = (audio.src && !audio.paused) ? audio.currentTime : (ts - startTime) / 1000;

    const screen   = document.getElementById('lyrics-screen');
    const screenH  = screen.offsetHeight;
    const screenW  = screen.offsetWidth;

    /* Spawn lines */
    LYRICS.forEach((entry, idx) => {
      const [text, start, duration] = entry;
      
      // FIX 2: Ensure elapsed time is inside the safe spawn window (start <= elapsed <= start + duration)
      // This stops lines from generating if the track halts or stalls at a timestamp past the lyric lifecycle.
      if (elapsed >= start && elapsed <= (start + duration) && !activeLines.find(l => l.idx === idx)) {
        const el = document.createElement('div');
        el.className = 'lyric-line';
        el.textContent = text;

        const nudge = (Math.random() * 0.3 - 0.15) * screenW;
        el.style.transform = `translateX(${nudge.toFixed(0)}px)`;
        el.style.top = screenH + 'px';
        screen.appendChild(el);

        activeLines.push({ el, idx, spawnedAt: elapsed, duration, nudge });
      }
    });

    /* Physics step & culling */
    activeLines = activeLines.filter(line => {
      const age    = elapsed - line.spawnedAt;
      const travelY = age * SCROLL_SPEED;
      const newTop  = screenH - travelY;

      line.el.style.top = newTop + 'px';

      const fadeStart = Math.max(1, line.duration - 2);
      if (age >= fadeStart && !line.el.classList.contains('fading')) {
        line.el.classList.add('fading');
      }

      if (newTop < -60 || age > line.duration + 0.7) {
        line.el.remove();
        return false;
      }
      return true;
    });

    animFrameId = requestAnimationFrame(tick);
  }
</script>
</body>
</html>
